<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <!-- 背景: ナチュラルな木目のアトリエ風グラデーション -->
  <defs>
    <linearGradient id="atelier" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4ebd9"/>
      <stop offset="60%" stop-color="#ead7b5"/>
      <stop offset="100%" stop-color="#c9a878"/>
    </linearGradient>
    <linearGradient id="window" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8e7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffe9b0" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a07854"/>
      <stop offset="100%" stop-color="#6e5034"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce4c8"/>
      <stop offset="100%" stop-color="#e6c39a"/>
    </linearGradient>
  </defs>

  <!-- 背景全面 -->
  <rect width="1200" height="800" fill="url(#atelier)"/>

  <!-- 左側の窓（自然光イメージ） -->
  <rect x="60" y="80" width="280" height="380" fill="url(#window)" opacity="0.7"/>
  <line x1="200" y1="80" x2="200" y2="460" stroke="#a08660" stroke-width="3" opacity="0.5"/>
  <line x1="60" y1="270" x2="340" y2="270" stroke="#a08660" stroke-width="3" opacity="0.5"/>

  <!-- 右奥の棚（作品が飾られたイメージ） -->
  <rect x="900" y="180" width="240" height="320" fill="#7e5a3b" opacity="0.6"/>
  <line x1="900" y1="280" x2="1140" y2="280" stroke="#5a3e26" stroke-width="2"/>
  <line x1="900" y1="380" x2="1140" y2="380" stroke="#5a3e26" stroke-width="2"/>
  <!-- 棚に飾った作品 -->
  <rect x="920" y="200" width="60" height="60" fill="#ff8c42" rx="3"/>
  <rect x="1000" y="200" width="60" height="60" fill="#4fb3d9" rx="3"/>
  <rect x="1080" y="200" width="50" height="60" fill="#8fc66e" rx="3"/>
  <rect x="920" y="300" width="60" height="60" fill="#e94560" rx="3"/>
  <rect x="1000" y="300" width="60" height="60" fill="#f5c542" rx="3"/>
  <rect x="1080" y="300" width="50" height="60" fill="#b878c4" rx="3"/>
  <rect x="940" y="400" width="80" height="60" fill="#ff8c42" rx="3"/>
  <rect x="1040" y="400" width="80" height="60" fill="#4fb3d9" rx="3"/>

  <!-- 床 -->
  <rect x="0" y="600" width="1200" height="200" fill="#6e5034"/>

  <!-- 机 -->
  <rect x="250" y="500" width="700" height="160" fill="url(#desk)"/>
  <rect x="250" y="500" width="700" height="15" fill="#8a6845"/>

  <!-- 机上のポスカ（カラフルなペン群） -->
  <g transform="translate(280, 470)">
    <rect x="0" y="0" width="14" height="50" fill="#ff8c42" rx="2"/>
    <rect x="20" y="0" width="14" height="50" fill="#4fb3d9" rx="2"/>
    <rect x="40" y="0" width="14" height="50" fill="#8fc66e" rx="2"/>
    <rect x="60" y="0" width="14" height="50" fill="#e94560" rx="2"/>
    <rect x="80" y="0" width="14" height="50" fill="#f5c542" rx="2"/>
    <rect x="100" y="0" width="14" height="50" fill="#b878c4" rx="2"/>
    <rect x="120" y="0" width="14" height="50" fill="#2c2c2c" rx="2"/>
  </g>

  <!-- 机上の紙（描きかけの絵） -->
  <rect x="500" y="490" width="280" height="180" fill="#fffcf5" stroke="#d4c0a0" stroke-width="2"/>
  <!-- 描きかけの絵: スニーカー風 -->
  <ellipse cx="640" cy="600" rx="100" ry="35" fill="#ff8c42"/>
  <rect x="560" y="540" width="160" height="50" rx="25" fill="#ffffff" stroke="#2c2c2c" stroke-width="2"/>
  <circle cx="590" cy="565" r="8" fill="#4fb3d9"/>
  <circle cx="640" cy="565" r="8" fill="#8fc66e"/>
  <circle cx="690" cy="565" r="8" fill="#e94560"/>

  <!-- 人物: 講師（中央右、ポスカを持って絵を見ている姿） -->
  <!-- 胴体 -->
  <path d="M 760 320 Q 760 260 820 260 Q 880 260 880 320 L 890 480 Q 890 510 870 510 L 770 510 Q 750 510 750 480 Z" fill="#3a4a5c"/>
  <!-- 首 -->
  <rect x="800" y="200" width="40" height="60" fill="url(#skin)"/>
  <!-- 頭 -->
  <circle cx="820" cy="170" r="55" fill="url(#skin)"/>
  <!-- 髪 -->
  <path d="M 770 140 Q 770 110 820 110 Q 870 110 870 140 Q 870 155 855 165 L 855 175 Q 870 165 870 180 L 870 185 L 855 180 Q 855 195 840 195 L 800 195 Q 785 195 785 180 L 770 185 L 770 180 Q 770 165 785 175 L 785 165 Q 770 155 770 140 Z" fill="#2a1d12"/>
  <!-- 目 -->
  <ellipse cx="805" cy="170" rx="3" ry="5" fill="#2a1d12"/>
  <ellipse cx="835" cy="170" rx="3" ry="5" fill="#2a1d12"/>
  <!-- 口（穏やかな微笑み） -->
  <path d="M 810 195 Q 820 200 830 195" stroke="#8a5a3a" stroke-width="2" fill="none"/>
  <!-- 右腕（机上の絵に向かって伸びる） -->
  <path d="M 770 320 Q 720 380 680 480 Q 670 510 690 530 Q 700 530 705 520 Q 720 460 750 400 Z" fill="#3a4a5c"/>
  <!-- 右手 -->
  <circle cx="690" cy="525" r="14" fill="url(#skin)"/>
  <!-- ポスカを握っている -->
  <rect x="678" y="510" width="6" height="35" fill="#ff8c42" rx="1"/>
  <!-- 左腕 -->
  <path d="M 870 320 Q 920 360 910 440 L 905 460 Q 900 470 890 465 Q 875 410 870 380 Z" fill="#3a4a5c"/>

  <!-- 壁にかかったYouTube銀の盾（左上） -->
  <g transform="translate(380, 100)">
    <rect x="0" y="0" width="100" height="130" fill="#2a2a2a" rx="4"/>
    <path d="M 20 25 L 80 25 L 90 70 L 50 115 L 10 70 Z" fill="#d4d4d4" stroke="#666" stroke-width="2"/>
    <text x="50" y="55" text-anchor="middle" font-family="serif" font-size="7" fill="#2a2a2a" font-weight="bold">YouTube</text>
    <text x="50" y="68" text-anchor="middle" font-family="serif" font-size="6" fill="#2a2a2a">SILVER</text>
    <text x="50" y="80" text-anchor="middle" font-family="serif" font-size="6" fill="#2a2a2a">100K</text>
  </g>

  <!-- 壁にかかった大きな作品（中央背景） -->
  <rect x="540" y="100" width="220" height="160" fill="#fff" stroke="#5a3e26" stroke-width="6"/>
  <circle cx="600" cy="170" r="30" fill="#ff8c42"/>
  <circle cx="680" cy="180" r="25" fill="#4fb3d9"/>
  <rect x="580" y="200" width="120" height="40" fill="#8fc66e" rx="5"/>

  <!-- 仮素材の注釈（薄く） -->
  <text x="600" y="775" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5a4a35" opacity="0.6">[ 仮イラスト ] 講師がアトリエで作品を制作している様子（後で写真に差し替え）</text>
</svg>
