<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5ede2"/>
      <stop offset="50%" stop-color="#ead9b8"/>
      <stop offset="100%" stop-color="#d4b896"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#a08660" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#g1)"/>
  <rect width="1600" height="900" fill="url(#dots)"/>
  <g transform="translate(800,450)">
    <circle cx="0" cy="-50" r="120" fill="#fff" opacity="0.6"/>
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="28" fill="#5a4a35">[仮画像]</text>
    <text x="0" y="10" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#7a6a55">講師がポスカで作品を描いている写真</text>
    <text x="0" y="40" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#9a8a75">後で本物の写真に差し替えてください</text>
  </g>
</svg>
